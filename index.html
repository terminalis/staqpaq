    <!--
      No-build native ESM. Vendored libraries are committed under vendor/ and
      mapped to bare specifiers here so authored modules import them as
      `lit` / `idb-keyval` / `fflate`. The boundary-assertion scripts read this
      same import map, so the static import graph they check matches the runtime.
    -->
    <script type="importmap">
      {
        "imports": {
          "lit": "./vendor/lit-core.min.js",
          "idb-keyval": "./vendor/idb-keyval.js",
          "fflate": "./vendor/fflate.js"
        }
      }
    </script>

    <!-- Presentation assets (Presentation Binding delivery — ui-manifest.yaml).
         VT323 (display/numerals), Share Tech Mono (everything else), and the
         selected app icons are vendored locally. App logic, persistence, type,
         and icon presentation do not require runtime CDN access. -->
    <!-- Global token system + presentation styles (Step 2). Token layer first. -->
    <link rel="stylesheet" href="./src/ui/styles/fonts.css" />
    <link rel="stylesheet" href="./src/ui/styles/tokens.css" />
    <link rel="stylesheet" href="./src/ui/styles/base.css" />
    <link rel="stylesheet" href="./src/ui/styles/components.css" />
    <link rel="stylesheet" href="./src/ui/styles/screens.css" />

    <!-- The application boot module is wired in Step 10 (UX structure). -->
    <script type="module" src="./src/ui/main.js"></script>
  </head>
  <body>
    <div id="app"><!-- staqpaq mounts here (Step 10) --></div>
  </body>
