# Verification gate for this no-build static repo.
# There is no compile or bundle step; CI runs the repository checks directly.
name: assertions

on:
  push:
  pull_request:

jobs:
  boundary-assertions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Run repository checks
        run: npm run check
